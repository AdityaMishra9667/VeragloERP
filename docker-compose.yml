services:
  postgres:
    image: postgres:16-alpine
    container_name: veraglo-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: veraglo
      POSTGRES_PASSWORD: veraglo
      POSTGRES_DB: veraglo_erp
    ports:
      - "5432:5432"
    volumes:
      - veraglo_pgdata:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veraglo -d veraglo_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  veraglo_pgdata:
