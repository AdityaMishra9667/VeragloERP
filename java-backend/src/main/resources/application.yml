spring:
  application:
    name: veraglo-erp
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/veraglo_erp}
    username: ${DB_USER:veraglo}
    password: ${DB_PASSWORD:veraglo}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:3000}
  compression:
    enabled: true

veraglo:
  jwt:
    secret: ${JWT_SECRET:veraglo-erp-change-me-in-production-use-256bit-secret-key!!}
    access-token-minutes: ${JWT_ACCESS_MINUTES:480}
  cors:
    allowed-origins: ${CORS_ORIGIN:http://localhost:3000}
  frontend:
    # Repo root (index.html + src/). start-java.sh sets VERAGLO_FRONTEND_PATH automatically.
    static-path: ${VERAGLO_FRONTEND_PATH:../}
  migration:
    legacy-json-path: ${LEGACY_JSON_PATH:}
  licensing:
    secret: ${LICENSE_SECRET:veraglo-erp-lic-v1}
  data-path:
    default: ${VERAGLO_DATA_DIR:}

logging:
  level:
    com.veraglo: INFO
    org.springframework.security: WARN
